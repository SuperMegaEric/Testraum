<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Moleküle: Laser & Highlight Fix</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/super-hands@3.0.4/dist/super-hands.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <script>
        // Komponente für das Highlight beim Drüberstreichen (Hover)
        AFRAME.registerComponent('hover-highlight', {
            init: function () {
                var el = this.el;
                // Wenn der Laser das Objekt trifft (hover)
                el.addEventListener('hover-start', function (evt) {
                    // Farbe ändern (leicht gelb)
                    el.setAttribute('material', 'emissive', '#ffffcc');
                    el.setAttribute('material', 'emissiveIntensity', '0.3');
                });
                // Wenn der Laser das Objekt verlässt
                el.addEventListener('hover-end', function (evt) {
                    // Farbe zurücksetzen
                    el.setAttribute('material', 'emissive', 'black');
                    el.setAttribute('material', 'emissiveIntensity', '0');
                });
            }
        });

        // Komponente für das Highlight beim Greifen/Skalieren (Active)
        AFRAME.registerComponent('grab-highlight', {
            init: function () {
                var el = this.el;
                // Wenn der Trigger gedrückt wird (grab)
                el.addEventListener('grab-start', function (evt) {
                    // Farbe ändern (hellgrün)
                    el.setAttribute('material', 'emissive', '#ccffcc');
                    el.setAttribute('material', 'emissiveIntensity', '0.5');
                });
                // Wenn der Trigger losgelassen wird
                el.addEventListener('grab-end', function (evt) {
                    // Farbe zurücksetzen
                    el.setAttribute('material', 'emissive', 'black');
                    el.setAttribute('material', 'emissiveIntensity', '0');
                });
            }
        });
    </script>
</head>
<body>
    <a-scene>
        
        <a-entity environment="preset: atmospheric; skyColor: #4dabf7; clouds: 0.7; ground: none"></a-entity>

        <a-assets>
            <a-asset-item id="diamantModel" src="Diamant.glb"></a-asset-item>
            <canvas id="gridCanvas" width="128" height="128"></canvas>
        </a-assets>

        <a-entity id="rig" movement-controls="speed: 0.15">
            <a-entity camera position="0 1.6 0" look-controls></a-entity>

            <a-entity id="leftHand"
                      hand-controls="hand: left"
                      super-hands="colliderEvent: raycaster-intersection; 
                                   colliderEventProperty: els; 
                                   colliderEndEvent: raycaster-intersection-cleared; 
                                   colliderEndEventProperty: el;
                                   grabStartButtons: triggerdown;
                                   grabEndButtons: triggerup;
                                   stretchStartButtons: triggerdown;
                                   stretchEndButtons: triggerup"
                      raycaster="objects: .interactable; far: 4; showLine: true; lineColor: red; interval: 100">
            </a-entity>

            <a-entity id="rightHand"
                      hand-controls="hand: right"
                      super-hands="colliderEvent: raycaster-intersection; 
                                   colliderEventProperty: els; 
                                   colliderEndEvent: raycaster-intersection-cleared; 
                                   colliderEndEventProperty: el;
                                   grabStartButtons: triggerdown;
                                   grabEndButtons: triggerup;
                                   stretchStartButtons: triggerdown;
                                   stretchEndButtons: triggerup"
                      raycaster="objects: .interactable; far: 4; showLine: true; lineColor: red; interval: 100">
            </a-entity>
        </a-entity>

        <a-plane position="0 0.01 0" rotation="-90 0 0" width="100" height="100"
                 material="src: #gridCanvas; repeat: 100 100; shader: flat">
        </a-plane>

        <a-entity class="interactable"
                  gltf-model="#diamantModel"
                  position="0 1.4 -2"
                  scale="0.6 0.6 0.6"
                  hoverable
                  grabbable
                  stretchable
                  hover-highlight
                  grab-highlight>
        </a-entity>

        <a-entity light="type: ambient; intensity: 0.7"></a-entity>
        <a-entity light="type: directional; intensity: 0.6" position="1 3 1"></a-entity>

    </a-scene>

    <script>
        // Boden-Textur Generator
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, 128, 128);
        ctx.strokeStyle = '#00FF00';
        ctx.lineWidth = 6;
        ctx.strokeRect(0, 0, 128, 128);
    </script>
</body>
</html>
