<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pico 4 Ultra VR Diamant</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
<script src="https://unpkg.com/super-hands@3.0.4/dist/super-hands.min.js"></script>

<script>
// Component, damit das Modell Handbewegungen folgen kann
AFRAME.registerComponent('follow-hand', {
  schema: { hand: {type: 'selector'} },
  init: function() {
    this.grabbed = false;

    // Grip gedrückt → greifen
    this.data.hand.addEventListener('gripdown', () => { this.grabbed = true; });

    // Grip losgelassen → loslassen
    this.data.hand.addEventListener('gripup', () => { this.grabbed = false; });
  },
  tick: function() {
    if(this.grabbed) {
      // Hand-Position und -Rotation auslesen
      const handPos = new THREE.Vector3();
      const handQuat = new THREE.Quaternion();
      this.data.hand.object3D.getWorldPosition(handPos);
      this.data.hand.object3D.getWorldQuaternion(handQuat);

      // Modell auf Hand übertragen
      this.el.object3D.position.copy(handPos);
      this.el.object3D.quaternion.copy(handQuat);
    }
  }
});
</script>
</head>

<body>
<a-scene>

  <!-- Assets -->
  <a-assets>
    <a-asset-item id="diamantModel" src="Diamant.glb"></a-asset-item>
  </a-assets>

  <!-- Spieler Rig -->
  <a-entity id="rig" movement-controls="speed:0.25">
    <a-entity camera position="0 1.6 0" look-controls></a-entity>

    <!-- Linke Hand -->
    <a-entity
      id="leftHand"
      hand-controls="hand: left; handModelStyle: lowPoly; color: #ffcccc">
    </a-entity>

    <!-- Rechte Hand -->
    <a-entity
      id="rightHand"
      hand-controls="hand: right; handModelStyle: lowPoly; color: #ffcccc">
    </a-entity>
  </a-entity>

  <!-- Diamant-Modell (1/4 Größe) -->
  <a-entity
    id="diamant"
    position="0 1.5 -2"
    scale="0.25 0.25 0.25"
    follow-hand="hand: #leftHand">
    <a-entity gltf-model="#diamantModel" scale="1 1 1"></a-entity>
  </a-entity>

  <!-- Licht -->
  <a-entity light="type: ambient; intensity:0.8"></a-entity>
  <a-entity light="type: directional; intensity:0.6" position="1 4 2"></a-entity>

</a-scene>
</body>
</html>
