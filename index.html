<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pico 4 Ultra VR Diamant – bewegbar & rotierbar</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

<script>
// Component: Modell folgt Hand mit flexiblem Griffpunkt, nur bei Grip
AFRAME.registerComponent('grab-with-offset', {
  schema: { hand: {type: 'selector'} },
  
  init: function() {
    this.grabbed = false;
    this.offset = new THREE.Vector3();
    this.quatOffset = new THREE.Quaternion();

    // Grip gedrückt → greifen
    this.data.hand.addEventListener('gripdown', () => {
      // Weltposition des Hands
      const handPos = new THREE.Vector3();
      this.data.hand.object3D.getWorldPosition(handPos);

      // Weltposition Modell
      const modelPos = new THREE.Vector3();
      this.el.object3D.getWorldPosition(modelPos);

      // Offset merken
      this.offset.copy(modelPos).sub(handPos);

      // Quaternion-Differenz merken
      const handQuat = new THREE.Quaternion();
      this.data.hand.object3D.getWorldQuaternion(handQuat);
      const modelQuat = this.el.object3D.getWorldQuaternion(new THREE.Quaternion());
      this.quatOffset.copy(handQuat.inverse()).multiply(modelQuat);

      this.grabbed = true;
    });

    // Grip loslassen → loslassen
    this.data.hand.addEventListener('gripup', () => {
      this.grabbed = false;
    });
  },

  tick: function() {
    if(this.grabbed) {
      const handPos = new THREE.Vector3();
      const handQuat = new THREE.Quaternion();
      this.data.hand.object3D.getWorldPosition(handPos);
      this.data.hand.object3D.getWorldQuaternion(handQuat);

      const newPos = new THREE.Vector3().copy(this.offset).applyQuaternion(handQuat).add(handPos);
      const newQuat = new THREE.Quaternion().copy(handQuat).multiply(this.quatOffset);

      this.el.object3D.position.copy(newPos);
      this.el.object3D.quaternion.copy(newQuat);
    }
  }
});
</script>
</head>

<body>
<a-scene>

  <!-- Assets -->
  <a-assets>
    <a-asset-item id="diamantModel" src="Diamant.glb"></a-asset-item>
  </a-assets>

  <!-- Player Rig -->
  <a-entity id="rig" movement-controls="speed:0.25">
    <a-entity camera position="0 1.6 0" look-controls></a-entity>

    <!-- Linke Hand -->
    <a-entity
      id="leftHand"
      hand-controls="hand: left; handModelStyle: lowPoly; color: #ffcccc">
    </a-entity>

    <!-- Rechte Hand -->
    <a-entity
      id="rightHand"
      hand-controls="hand: right; handModelStyle: lowPoly; color: #ffcccc">
    </a-entity>
  </a-entity>

  <!-- Diamant-Modell (1/4 Größe) -->
  <a-entity
    id="diamant"
    position="0 1.5 -2"
    scale="0.25 0.25 0.25"
    grab-with-offset="hand: #leftHand">
    <a-entity gltf-model="#diamantModel" scale="1 1 1"></a-entity>
  </a-entity>

  <!-- Licht -->
  <a-entity light="type: ambient; intensity:0.8"></a-entity>
  <a-entity light="type: directional; intensity:0.6" position="1 4 2"></a-entity>

</a-scene>
</body>
</html>
