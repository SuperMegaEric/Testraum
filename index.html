<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Moleküle – Direct Hand Parenting</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
<script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

<script>

AFRAME.registerComponent("hand-grabber",{

init:function(){

this.grabbed=null
this.hand=this.el

this.el.addEventListener("triggerdown",()=>{

const hit=this.hand.components["sphere-collider"].intersectedEls

if(!hit.length) return

const target=hit[0]

this.grabbed=target

const worldPos=new THREE.Vector3()
target.object3D.getWorldPosition(worldPos)

this.hand.object3D.add(target.object3D)

target.object3D.position.copy(this.hand.object3D.worldToLocal(worldPos))

})

this.el.addEventListener("triggerup",()=>{

if(!this.grabbed) return

const obj=this.grabbed

const worldPos=new THREE.Vector3()
const worldRot=new THREE.Quaternion()

obj.object3D.getWorldPosition(worldPos)
obj.object3D.getWorldQuaternion(worldRot)

this.el.sceneEl.object3D.add(obj.object3D)

obj.object3D.position.copy(worldPos)
obj.object3D.quaternion.copy(worldRot)

this.grabbed=null

})

}

})

</script>
</head>

<body>

<a-scene>

<a-entity environment="preset: forest; skyColor: #88ccee; lighting: distant; ground: none"></a-entity>

<a-assets>

<a-asset-item id="diamantModel" src="Diamant.glb"></a-asset-item>
<a-asset-item id="graphitModel" src="Graphit.glb"></a-asset-item>

<canvas id="gridCanvas" width="128" height="128"></canvas>

</a-assets>

<a-entity id="rig" movement-controls="speed:0.25">

<a-entity camera position="0 1.6 0" look-controls></a-entity>

<a-entity
id="leftHand"
hand-controls="hand: left"
sphere-collider="objects: .grabbable; radius:0.2"
hand-grabber>
</a-entity>

<a-entity
id="rightHand"
hand-controls="hand: right"
sphere-collider="objects: .grabbable; radius:0.2"
hand-grabber>
</a-entity>

</a-entity>

<a-plane
position="0 0.01 0"
rotation="-90 0 0"
width="200"
height="200"
material="src:#gridCanvas; repeat:200 200; shader:flat">
</a-plane>

<!-- Diamant 10 m links -->

<a-entity
class="grabbable"
position="-10 1.5 -10">

<a-entity
gltf-model="#diamantModel"
scale="1 1 1">
</a-entity>

</a-entity>

<!-- Graphit 10 m rechts -->

<a-entity
class="grabbable"
position="10 1.5 -10">

<a-entity
gltf-model="#graphitModel"
scale="1 1 1">
</a-entity>

</a-entity>

<a-entity light="type:ambient; intensity:0.8"></a-entity>
<a-entity light="type:directional; intensity:0.6" position="2 4 1"></a-entity>

</a-scene>

<script>

const canvas=document.getElementById("gridCanvas")
const ctx=canvas.getContext("2d")

ctx.fillStyle="white"
ctx.fillRect(0,0,128,128)

ctx.strokeStyle="#00ff00"
ctx.lineWidth=6
ctx.strokeRect(0,0,128,128)

</script>

</body>
</html>
