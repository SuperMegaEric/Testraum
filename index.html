<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Kristallstrukturen</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

<script src="https://unpkg.com/super-hands@3.0.4/dist/super-hands.min.js"></script>

<script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

</head>

<body>

<a-scene>

<!-- Umgebung -->
<a-entity environment="preset: forest; skyType: atmosphere; skyColor: #88ccee"></a-entity>

<a-assets>

<a-asset-item id="diamantModel" src="Diamant.glb"></a-asset-item>
<a-asset-item id="graphitModel" src="Graphit.glb"></a-asset-item>

</a-assets>

<!-- Spieler -->
<a-entity id="rig" movement-controls="speed:0.25">

<a-entity camera position="0 1.6 0" look-controls></a-entity>

<!-- linke Hand -->
<a-entity
id="leftHand"
laser-controls="hand: left"
super-hands="
grabStartButtons: gripdown;
grabEndButtons: gripup;
stretchStartButtons: gripdown;
stretchEndButtons: gripup"
sphere-collider="objects: .interactable; radius: 0.25">
</a-entity>

<!-- rechte Hand -->
<a-entity
id="rightHand"
laser-controls="hand: right"
super-hands="
grabStartButtons: gripdown;
grabEndButtons: gripup;
stretchStartButtons: gripdown;
stretchEndButtons: gripup"
sphere-collider="objects: .interactable; radius: 0.25">
</a-entity>

</a-entity>

<!-- Diamant -->

<a-box
class="interactable"
position="-10 1.5 -10"
width="2"
height="2"
depth="2"
material="color:red; transparent:true; opacity:0.35"
grabbable
stretchable
draggable>

<a-entity
gltf-model="#diamantModel"
scale="1 1 1">
</a-entity>

</a-box>

<!-- Graphit -->

<a-box
class="interactable"
position="10 1.5 -10"
width="2"
height="2"
depth="2"
material="color:red; transparent:true; opacity:0.35"
grabbable
stretchable
draggable>

<a-entity
gltf-model="#graphitModel"
scale="1 1 1">
</a-entity>

</a-box>

<!-- Licht -->

<a-entity light="type:ambient; intensity:0.8"></a-entity>
<a-entity light="type:directional; intensity:0.6" position="1 4 2"></a-entity>

</a-scene>

</body>
</html>
