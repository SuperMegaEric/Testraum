<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Moleküle: Präzisions-Fix</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/super-hands@3.0.4/dist/super-hands.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <script>
        // Verbesserte Highlight-Komponente für GLB-Modelle
        AFRAME.registerComponent('molecule-highlight', {
            init: function () {
                this.el.addEventListener('hover-start', () => this.setHighlight('#ffff00', 0.5)); // Gelb
                this.el.addEventListener('hover-end', () => this.setHighlight('#000000', 0));
                this.el.addEventListener('grab-start', () => this.setHighlight('#00ff00', 0.8)); // Grün
                this.el.addEventListener('grab-end', () => this.setHighlight('#ffff00', 0.5)); // Zurück zu Gelb
            },
            setHighlight: function (color, intensity) {
                const mesh = this.el.getObject3D('mesh');
                if (mesh) {
                    mesh.traverse((node) => {
                        if (node.isMesh && node.material) {
                            node.material.emissive = new THREE.Color(color);
                            node.material.emissiveIntensity = intensity;
                        }
                    });
                }
            }
        });
    </script>
</head>
<body>
    <a-scene>
        
        <a-entity environment="preset: atmospheric; skyColor: #4dabf7; clouds: 0.7; ground: none"></a-entity>

        <a-assets>
            <a-asset-item id="diamantModel" src="Diamant.glb"></a-asset-item>
            <canvas id="gridCanvas" width="128" height="128"></canvas>
        </a-assets>

        <a-entity id="rig" movement-controls="speed: 0.15">
            <a-entity camera position="0 1.6 0" look-controls></a-entity>

            <a-entity id="leftHand"
                      hand-controls="hand: left"
                      super-hands="colliderEvent: raycaster-intersection; 
                                   colliderEventProperty: els; 
                                   colliderEndEvent: raycaster-intersection-cleared; 
                                   colliderEndEventProperty: el;
                                   grabStartButtons: triggerdown; grabEndButtons: triggerup;
                                   stretchStartButtons: triggerdown; stretchEndButtons: triggerup"
                      raycaster="objects: .interactable; far: 4; showLine: true; lineColor: red; direction: 0 0 -1"
                      rotation="-15 0 0">
            </a-entity>

            <a-entity id="rightHand"
                      hand-controls="hand: right"
                      super-hands="colliderEvent: raycaster-intersection; 
                                   colliderEventProperty: els; 
                                   colliderEndEvent: raycaster-intersection-cleared; 
                                   colliderEndEventProperty: el;
                                   grabStartButtons: triggerdown; grabEndButtons: triggerup;
                                   stretchStartButtons: triggerdown; stretchEndButtons: triggerup"
                      raycaster="objects: .interactable; far: 4; showLine: true; lineColor: red; direction: 0 0 -1"
                      rotation="-15 0 0">
            </a-entity>
        </a-entity>

        <a-plane position="0 0.01 0" rotation="-90 0 0" width="100" height="100"
                 material="src: #gridCanvas; repeat: 100 100; shader: flat">
        </a-plane>

        <a-entity class="interactable"
                  gltf-model="#diamantModel"
                  position="0 1.4 -2"
                  scale="0.6 0.6 0.6"
                  hoverable
                  grabbable
                  stretchable
                  molecule-highlight>
        </a-entity>

        <a-entity light="type: ambient; intensity: 0.7"></a-entity>
        <a-entity light="type: directional; intensity: 0.6" position="1 3 1"></a-entity>

    </a-scene>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, 128, 128);
        ctx.strokeStyle = '#00FF00';
        ctx.lineWidth = 6;
        ctx.strokeRect(0, 0, 128, 128);
    </script>
</body>
</html>
