<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Moleküle</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
<script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

<script>

AFRAME.registerComponent("grab-parent",{

init:function(){

this.grabbed=null
this.hand=this.el

this.el.addEventListener("triggerdown",()=>{

const collider=this.hand.components["sphere-collider"]
if(!collider) return

const targets=collider.intersectedEls
if(targets.length===0) return

const target=targets[0]

this.grabbed=target

const worldPos=new THREE.Vector3()
const worldQuat=new THREE.Quaternion()

target.object3D.getWorldPosition(worldPos)
target.object3D.getWorldQuaternion(worldQuat)

this.hand.object3D.add(target.object3D)

target.object3D.position.copy(this.hand.object3D.worldToLocal(worldPos))
target.object3D.quaternion.copy(worldQuat)

})

this.el.addEventListener("triggerup",()=>{

if(!this.grabbed) return

const obj=this.grabbed

const worldPos=new THREE.Vector3()
const worldQuat=new THREE.Quaternion()

obj.object3D.getWorldPosition(worldPos)
obj.object3D.getWorldQuaternion(worldQuat)

this.el.sceneEl.object3D.add(obj.object3D)

obj.object3D.position.copy(worldPos)
obj.object3D.quaternion.copy(worldQuat)

this.grabbed=null

})

}

})

</script>
</head>

<body>

<a-scene>

<!-- ENVIRONMENT -->
<a-entity environment="preset: forest;
                       skyColor: #88ccee;
                       lighting: distant;
                       groundTexture: walkernoise;
                       groundColor: #6ab04c">
</a-entity>

<a-assets>

<a-asset-item id="diamantModel" src="Diamant.glb"></a-asset-item>
<a-asset-item id="graphitModel" src="Graphit.glb"></a-asset-item>

</a-assets>

<a-entity id="rig" movement-controls="speed:0.2">

<a-entity camera position="0 1.6 0" look-controls></a-entity>

<a-entity
id="leftHand"
hand-controls="hand: left"
sphere-collider="objects: .hitbox; radius:0.25"
grab-parent>
</a-entity>

<a-entity
id="rightHand"
hand-controls="hand: right"
sphere-collider="objects: .hitbox; radius:0.25"
grab-parent>
</a-entity>

</a-entity>

<!-- DIAMANT -->

<a-box
class="hitbox"
position="-10 1.5 -10"
depth="1.6"
height="1.6"
width="1.6"
material="color:red; transparent:true; opacity:0.35">

<a-entity
gltf-model="#diamantModel"
scale="1 1 1">
</a-entity>

</a-box>

<!-- GRAPHIT -->

<a-box
class="hitbox"
position="10 1.5 -10"
depth="1.6"
height="1.6"
width="1.6"
material="color:red; transparent:true; opacity:0.35">

<a-entity
gltf-model="#graphitModel"
scale="1 1 1">
</a-entity>

</a-box>

<a-entity light="type:ambient; intensity:0.9"></a-entity>
<a-entity light="type:directional; intensity:0.6" position="1 4 2"></a-entity>

</a-scene>

</body>
</html>
