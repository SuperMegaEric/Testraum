<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Moleküle: Debug-Modus</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/super-hands@3.0.4/dist/super-hands.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <script>
        // Highlight-Komponente für die Debug-Boxen
        AFRAME.registerComponent('debug-highlight', {
            init: function () {
                this.el.addEventListener('grab-start', () => {
                    this.el.setAttribute('material', 'color', '#00ff00'); // Wird grün beim Greifen
                    this.el.setAttribute('material', 'opacity', '0.6');
                });
                this.el.addEventListener('grab-end', () => {
                    this.el.setAttribute('material', 'color', '#ff0000'); // Zurück zu Rot
                    this.el.setAttribute('material', 'opacity', '0.2');
                });
            }
        });
    </script>
</head>
<body>
    <a-scene>
        
        <a-entity environment="preset: atmospheric; skyColor: #4dabf7; ground: none"></a-entity>

        <a-assets>
            <a-asset-item id="diamantModel" src="Diamant.glb"></a-asset-item>
            <a-asset-item id="graphitModel" src="Graphit.glb"></a-asset-item>
        </a-assets>

        <a-entity id="rig" movement-controls="speed: 0.2">
            <a-entity camera position="0 1.6 0" look-controls></a-entity>

            <a-entity id="leftHand"
                      hand-controls="hand: left"
                      super-hands="colliderEvent: raycaster-intersection; 
                                   colliderEventProperty: els; 
                                   colliderEndEvent: raycaster-intersection-cleared; 
                                   colliderEndEventProperty: el;
                                   grabStartButtons: triggerdown; grabEndButtons: triggerup">
                <a-entity raycaster="objects: .interactable; far: 20; showLine: true; lineColor: red"
                          position="0 -0.2 -0.1"
                          rotation="-90 0 0">
                </a-entity>
            </a-entity>

            <a-entity id="rightHand"
                      hand-controls="hand: right"
                      super-hands="colliderEvent: raycaster-intersection; 
                                   colliderEventProperty: els; 
                                   colliderEndEvent: raycaster-intersection-cleared; 
                                   colliderEndEventProperty: el;
                                   grabStartButtons: triggerdown; grabEndButtons: triggerup">
                <a-entity raycaster="objects: .interactable; far: 20; showLine: true; lineColor: blue"
                          position="0 -0.2 -0.1"
                          rotation="-90 0 0">
                </a-entity>
            </a-entity>
        </a-entity>

        <a-box class="interactable"
               position="-5 1.5 -10"
               width="2" height="2" depth="2"
               material="color: #ff0000; opacity: 0.2; transparent: true"
               grabbable stretchable debug-highlight>
            <a-entity gltf-model="#diamantModel" scale="1 1 1" position="0 0 0"></a-entity>
        </a-box>

        <a-box class="interactable"
               position="5 1.5 -10"
               width="2" height="2" depth="2"
               material="color: #ff0000; opacity: 0.2; transparent: true"
               grabbable stretchable debug-highlight>
            <a-entity gltf-model="#graphitModel" scale="1 1 1" position="0 0 0"></a-entity>
        </a-box>

        <a-entity light="type: ambient; intensity: 0.7"></a-entity>
    </a-scene>
</body>
</html>
